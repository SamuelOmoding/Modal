<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C97A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A08030;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1610;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0805;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" fill="url(#darkGrad)" rx="4"/>

  <!-- Decorative top line -->
  <line x1="30" y1="18" x2="370" y2="18" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>

  <!-- Decorative bottom line -->
  <line x1="30" y1="142" x2="370" y2="142" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>

  <!-- Left corner mark -->
  <polyline points="30,18 30,30" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>
  <polyline points="30,18 42,18" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Right corner mark -->
  <polyline points="370,18 370,30" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>
  <polyline points="370,18 358,18" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Bottom left corner mark -->
  <polyline points="30,142 30,130" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>
  <polyline points="30,142 42,142" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Bottom right corner mark -->
  <polyline points="370,142 370,130" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>
  <polyline points="370,142 358,142" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- AC monogram mark — left side -->
  <g transform="translate(44, 42)">
    <!-- A shape -->
    <polygon points="18,0 36,52 28,52 22,34 14,34 8,52 0,52" fill="url(#goldGrad)" opacity="0.15"/>
    <polygon points="18,0 36,52 28,52 22,34 14,34 8,52 0,52" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- A crossbar -->
    <line x1="11" y1="32" x2="25" y2="32" stroke="url(#goldGrad)" stroke-width="1.5"/>
  </g>

  <!-- Vertical divider -->
  <line x1="110" y1="40" x2="110" y2="120" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

  <!-- Main text: AFRICAN -->
  <text
    x="124"
    y="85"
    font-family="'Bebas Neue', 'Arial Narrow', Arial, sans-serif"
    font-size="52"
    font-weight="400"
    letter-spacing="8"
    fill="url(#goldGrad)"
  >AFRICAN</text>

  <!-- Underscore decorative line -->
  <line x1="124" y1="95" x2="368" y2="95" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>

  <!-- Sub text: COUZIN -->
  <text
    x="126"
    y="118"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="20"
    font-weight="300"
    font-style="italic"
    letter-spacing="14"
    fill="#F5EDD8"
    opacity="0.75"
  >COUZIN</text>

  <!-- Small diamond accent -->
  <polygon points="200,130 204,134 200,138 196,134" fill="#C9A84C" opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="200"
    y="152"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="7"
    font-weight="300"
    letter-spacing="4"
    fill="#C9A84C"
    opacity="0.45"
    text-anchor="middle"
  >VERSATILITY · AUTHENTICITY · NAIROBI</text>

</svg>
